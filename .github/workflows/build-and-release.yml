name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version and check for changes
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="1.0.0"
          else
            LATEST_VERSION=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Building version ${NEW_VERSION}"

      - name: Generate release notes
        id: notes
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" ${LATEST_TAG}..HEAD)
          fi
          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release_notes.md

      - name: Build MacSlap
        run: |
          chmod +x build.sh
          # Modify build.sh to not create DMG on Desktop
          bash build.sh

      - name: Create DMG
        run: |
          DMG_PATH="MacSlap-${{ steps.version.outputs.version }}.dmg"
          hdiutil create \
            -volname "MacSlap" \
            -srcfolder build/dmg_staging \
            -ov \
            -format UDZO \
            "$DMG_PATH"
          echo "DMG_PATH=${DMG_PATH}" >> $GITHUB_ENV

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

          gh release create ${{ steps.version.outputs.tag }} \
            --title "MacSlap ${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release_notes.md \
            "${{ env.DMG_PATH }}"
